name: CI

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  test:
    name: Test
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Validate package manifest
        run: swift package dump-package

      - name: Create iOS simulator
        run: |
          RUNTIME_ID=$(xcrun simctl list runtimes --json | jq -r '[.runtimes[] | select(.platform == "iOS" and .isAvailable == true)] | last.identifier')
          SIMULATOR_UDID=$(xcrun simctl create "CI iPhone" "com.apple.CoreSimulator.SimDeviceType.iPhone-16" "$RUNTIME_ID")
          xcrun simctl boot "$SIMULATOR_UDID"
          xcrun simctl bootstatus "$SIMULATOR_UDID" -b
          echo "SIMULATOR_UDID=$SIMULATOR_UDID" >> "$GITHUB_ENV"

      - name: Test framework
        run: |
          xcodebuild test \
            -project LetterAvatarKit.xcodeproj \
            -scheme LetterAvatarKit \
            -destination "id=$SIMULATOR_UDID"

      - name: Build Swift example
        run: |
          xcodebuild build \
            -project LetterAvatarKitExample/LetterAvatarKitExample.xcodeproj \
            -scheme LetterAvatarKitExample \
            -destination 'generic/platform=iOS Simulator'
